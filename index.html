<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师工具站 - 在线教学工具集合</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 1. 引入全局配置 -->
  <script src="config.js"></script>
  <style>
    :root{--primary:#4facfe;--bg:#f8fafc;--card:#fff;--text:#1e293b;--light:#64748b;--border:#e2e8f0;--shadow:0 4px 6px rgba(0,0,0,.05)}
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{background:var(--bg);color:var(--text)}
    nav{background:var(--card);box-shadow:var(--shadow);position:sticky;top:0;z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--primary),#667eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .nav-link{color:var(--text);text-decoration:none;font-weight:500}
    .nav-link:hover{color:var(--primary)}
    .act-btn{padding:8px 16px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px}
    .act-btn:hover{opacity:.9}
    .hero{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:4rem 2rem;text-align:center}
    .hero h1{font-size:2.5rem;margin-bottom:1rem}
    .hero p{font-size:1.1rem;opacity:.9;margin-bottom:2rem}
    .search{max-width:600px;margin:0 auto;position:relative}
    .search input{width:100%;padding:1rem 3rem 1rem 1.5rem;border:none;border-radius:50px;font-size:1rem;box-shadow:0 10px 25px rgba(0,0,0,.15)}
    .search i{position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);color:var(--light)}
    .cats{max-width:1200px;margin:-2rem auto 2rem;padding:0 2rem;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
    .cat{padding:.7rem 1.5rem;background:var(--card);border:2px solid var(--border);border-radius:50px;cursor:pointer;font-weight:500;transition:.2s}
    .cat:hover,.cat.act{background:var(--primary);color:#fff;border-color:var(--primary)}
    .container{max-width:1200px;margin:2rem auto;padding:0 2rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;margin-bottom:4rem}
    .card{background:var(--card);border-radius:16px;padding:2rem;box-shadow:var(--shadow);transition:.3s;border:2px solid transparent}
    .card:hover{transform:translateY(-5px);box-shadow:0 15px 30px rgba(0,0,0,.08);border-color:var(--primary)}
    .icon{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:1rem}
    .card h3{font-size:1.2rem;margin-bottom:.5rem}
    .card p{color:var(--light);margin-bottom:1rem;line-height:1.5}
    .tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
    .tag{padding:.2rem .7rem;background:#f1f5f9;border-radius:20px;font-size:.8rem;color:var(--light)}
    .link{color:var(--primary);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:.5rem}
    .features{background:var(--card);padding:4rem 2rem;margin-top:4rem}
    .feat-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;text-align:center}
    .feat i{font-size:2.5rem;color:var(--primary);margin-bottom:1rem}
    footer{background:#0f172a;color:#94a3b8;padding:3rem 2rem;text-align:center;margin-top:4rem}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;justify-content:center;align-items:center}
    .modal.open{display:flex}
    .modal-box{background:#fff;padding:24px;border-radius:16px;width:90%;max-width:400px;text-align:center}
    .modal input{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;margin:12px 0;font-size:1rem}
    .btn-sub{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
    .btn-close{margin-top:10px;background:none;border:none;color:var(--light);cursor:pointer;text-decoration:underline}
    @media(max-width:768px){nav{flex-direction:column;gap:1rem}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo"><i class="fas fa-toolbox"></i> 教师工具站</a>
  <div class="nav-right">
    <a href="#tools" class="nav-link">工具列表</a>
    <a href="#about" class="nav-link">关于</a>
    <span id="memStatus" style="font-size:.9rem;color:var(--light)">🔒 游客</span>
    <button class="act-btn" onclick="openPay()"><i class="fas fa-key"></i> 激活会员</button>
  </div>
</nav>

<section class="hero">
  <h1>让教学更高效</h1>
  <p>为教师打造的专业在线工具集合，免费使用，无需注册</p>
  <div class="search"><input placeholder="搜索工具..." id="sIn"><i class="fas fa-search"></i></div>
</section>

<div class="cats">
  <div class="cat act" data-c="all">全部</div>
  <div class="cat" data-c="design">设计</div>
  <div class="cat" data-c="teaching">教学</div>
  <div class="cat" data-c="office">办公</div>
</div>

<div class="container" id="tools">
  <h2 style="text-align:center;margin-bottom:2rem">热门工具</h2>
  <div class="grid" id="tGrid"><div style="text-align:center;color:var(--light);grid-column:1/-1">加载中...</div></div>
</div>

<section class="features">
  <div class="feat-grid">
    <div class="feat"><i class="fas fa-bolt"></i><h3>快速高效</h3><p>打开即用，无需安装</p></div>
    <div class="feat"><i class="fas fa-shield-alt"></i><h3>安全隐私</h3><p>纯前端计算，数据不上传</p></div>
    <div class="feat"><i class="fas fa-mobile-alt"></i><h3>多端适配</h3><p>电脑/平板/手机通用</p></div>
    <div class="feat"><i class="fas fa-gift"></i><h3>完全免费</h3><p>基础功能永久开放</p></div>
  </div>
</section>

<footer id="about">© 2026 教师工具站 | 纯前端架构 | 本地运行</footer>

<div class="modal" id="payModal">
  <div class="modal-box">
    <h3>🔑 激活会员</h3>
    <p style="color:var(--light);font-size:.9rem">解锁无限生成/高清导出/去水印</p>
    <input type="text" id="kIn" placeholder="TEACHERPRO-xxxxxxxxxx">
    <button class="btn-sub" onclick="doPay()">立即激活</button>
    <p id="payMsg" style="margin-top:8px;font-size:.9rem;min-height:20px"></p>
    <button class="btn-close" onclick="closePay()">关闭</button>
  </div>
</div>

<script>
// 2. 使用全局配置中的密钥
const SECRET_KEY = SITE_CONFIG.SECRET_KEY;
const STORAGE_KEY = SITE_CONFIG.STORAGE.LICENSE;

// 会员核心逻辑
class PM{
  constructor(){this.d=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");this.p=this._ck();}
  _ck(){if(!this.d)return false;if(this.d.e&&Date.now()>this.d.e){localStorage.removeItem(STORAGE_KEY);this.d=null;return false;}return true;}
  async act(k){
    k=k.trim();if(!k.startsWith('TEACHERPRO-'))return{o:0,m:'格式错误'};
    try{
      const p=JSON.parse(atob(k.replace('TEACHERPRO-','')));
      // 🔑 核心修复：使用完全相同的 JSON 格式重建签名数据进行比对
      const signData = JSON.stringify({ t: p.t, i: p.i, e: p.e, d: p.d });
      const s=await this._h(signData);
      if(s!==p.s)return{o:0,m:'签名无效'};
      this.d={t:p.t,i:p.i,e:p.e,d:p.d||'dev_'+Math.random().toString(36).slice(2),a:Date.now()};
      localStorage.setItem(STORAGE_KEY,JSON.stringify(this.d));this.p=true;return{o:1,m:p.t==='permanent'?'永久会员':'30天会员'}}
    catch(e){return{o:0,m:'解析失败'}}}
  async _h(t){const e=new TextEncoder(),k=await crypto.subtle.importKey('raw',e.encode(SECRET_KEY),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  return Array.from(new Uint8Array(await crypto.subtle.sign('HMAC',k,e.encode(t)))).map(b=>b.toString(16).padStart(2,'0')).join('');}
}
const pm=new PM();

function updMemUI(){
  const s=document.getElementById('memStatus');
  if(pm.p){s.innerHTML='👑 '+ (pm.d.t==='permanent'?'永久会员':'会员');s.style.color='#10b981';}
  else{s.innerHTML='🔒 游客';s.style.color='var(--light)';}
}

function openPay(){document.getElementById('payModal').classList.add('open');document.getElementById('kIn').focus();}
function closePay(){document.getElementById('payModal').classList.remove('open');document.getElementById('payMsg').textContent='';}
async function doPay(){
  const k=document.getElementById('kIn').value;const m=document.getElementById('payMsg');
  m.style.color='#333';m.textContent='验证中...';
  const r=await pm.act(k);m.style.color=r.o?'#10b981':'#ef4444';m.textContent=(r.o?'✅ ':'❌ ')+r.m;
  if(r.o)setTimeout(()=>{closePay();updMemUI();},1000);
}
document.getElementById('kIn').addEventListener('keypress',e=>{if(e.key==='Enter')doPay();});

// 工具加载
async function load(){
  try{const r=await fetch('tools.json');const d=await r.json();
  document.getElementById('tGrid').innerHTML=d.tools.map(t=>`
    <div class="card" data-c="${t.category?.join(' ')||''}">
      <div class="icon" style="background:${t.gradient}"><i class="fas ${t.icon}"></i></div>
      <h3>${t.name}</h3><p>${t.description}</p>
      <div class="tags">${(t.tags||[]).map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      <a href="${t.file}" class="link">立即使用 <i class="fas fa-arrow-right"></i></a>
    </div>`).join('');
  }catch(e){document.getElementById('tGrid').innerHTML='<div style="text-align:center;color:#ef4444">加载失败，请检查 tools.json</div>';}
}

// 分类 & 搜索
document.querySelectorAll('.cat').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('.cat').forEach(x=>x.classList.remove('act'));c.classList.add('act');
  const cat=c.dataset.c;document.querySelectorAll('.card').forEach(card=>{
    const cc=card.dataset.c.split(' ');
    card.style.display=(cat==='all'||cc.includes(cat))?'block':'none';
  });
});
document.getElementById('sIn').oninput=e=>{const v=e.target.value.toLowerCase();document.querySelectorAll('.card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(v)?'block':'none');};

load();updMemUI();
</script>
</body>
</html>

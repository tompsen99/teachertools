<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具站管理后台 | 教师工具站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4facfe;
      --primary-dark: #00f2fe;
      --secondary: #667eea;
      --accent: #f093fb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; }

    .navbar {
      background: var(--card-bg);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--secondary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn-secondary { background: #f1f5f9; color: var(--text); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { opacity: 0.9; }

    .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .page-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .page-header p { color: var(--text-light); font-size: 1.1rem; }

    .dashboard {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 2rem;
    }

    @media (max-width: 1024px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .panel-title {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-light);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .color-picker-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .color-picker-wrapper input[type="color"] {
      width: 50px;
      height: 40px;
      padding: 0;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    .tag-input-wrapper {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.5rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      min-height: 48px;
      align-items: center;
    }
    .tag-input-wrapper input {
      flex: 1;
      min-width: 100px;
      border: none;
      outline: none;
      padding: 0.25rem;
    }
    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.75rem;
      background: var(--primary);
      color: white;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .tag-item .remove-tag {
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .preview-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 2px solid transparent;
      max-width: 350px;
    }
    .preview-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    .preview-icon {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .preview-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .preview-card p { color: var(--text-light); margin-bottom: 1rem; font-size: 0.9rem; }
    .preview-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .preview-tag {
      padding: 0.25rem 0.75rem;
      background: var(--bg);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .preview-link {
      color: var(--primary);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tools-list {
      margin-top: 2rem;
    }
    .tool-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: var(--bg);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      transition: all 0.3s;
    }
    .tool-item:hover {
      background: #eef2f7;
    }
    .tool-item-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .tool-item-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
    }
    .tool-item-details h4 { font-size: 1rem; margin-bottom: 0.25rem; }
    .tool-item-details span { font-size: 0.8rem; color: var(--text-light); }
    .tool-item-actions {
      display: flex;
      gap: 0.5rem;
    }
    .tool-item-actions button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .edit-btn { background: #dbeafe; color: #2563eb; }
    .edit-btn:hover { background: #bfdbfe; }
    .delete-btn { background: #fee2e2; color: #dc2626; }
    .delete-btn:hover { background: #fecaca; }

    .json-output {
      margin-top: 2rem;
    }
    .json-output textarea {
      width: 100%;
      height: 300px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      resize: vertical;
    }

    .success-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--success);
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      display: none;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-light);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .category-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .category-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .category-checkbox:hover {
      background: #e2e8f0;
    }
    .category-checkbox input {
      margin: 0;
    }

    .gradient-presets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .gradient-preset {
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .gradient-preset:hover,
    .gradient-preset.active {
      border-color: var(--text);
      transform: scale(1.1);
    }

    .icon-selector {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
      padding: 0.5rem;
      border: 2px solid var(--border);
      border-radius: 8px;
    }
    .icon-option {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--bg);
    }
    .icon-option:hover,
    .icon-option.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo"><i class="fas fa-toolbox"></i> 教师工具站</a>
  <div class="nav-actions">
    <a href="index.html" class="btn btn-secondary"><i class="fas fa-home"></i> 返回主页</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🛠️ 工具管理后台</h1>
    <p>添加、编辑和管理您的工具卡片，无需编辑代码</p>
  </div>

  <div class="dashboard">
    <!-- 左侧：表单区域 -->
    <div class="panel">
      <div class="panel-title"><i class="fas fa-plus-circle"></i> 添加新工具</div>
      
      <form id="toolForm">
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="form-group">
          <label>工具名称 *</label>
          <input type="text" id="toolName" placeholder="例如：云朵字生成器" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>文件名 *</label>
            <input type="text" id="toolFile" placeholder="例如：cloud-text.html" required>
          </div>
          <div class="form-group">
            <label>图标选择</label>
            <div class="icon-selector" id="iconSelector">
              <div class="icon-option active" data-icon="fa-cloud"><i class="fas fa-cloud"></i></div>
              <div class="icon-option" data-icon="fa-calculator"><i class="fas fa-calculator"></i></div>
              <div class="icon-option" data-icon="fa-file-pdf"><i class="fas fa-file-pdf"></i></div>
              <div class="icon-option" data-icon="fa-palette"><i class="fas fa-palette"></i></div>
              <div class="icon-option" data-icon="fa-font"><i class="fas fa-font"></i></div>
              <div class="icon-option" data-icon="fa-image"><i class="fas fa-image"></i></div>
              <div class="icon-option" data-icon="fa-chart-bar"><i class="fas fa-chart-bar"></i></div>
              <div class="icon-option" data-icon="fa-calendar"><i class="fas fa-calendar"></i></div>
              <div class="icon-option" data-icon="fa-clock"><i class="fas fa-clock"></i></div>
              <div class="icon-option" data-icon="fa-file-alt"><i class="fas fa-file-alt"></i></div>
              <div class="icon-option" data-icon="fa-pen"><i class="fas fa-pen"></i></div>
              <div class="icon-option" data-icon="fa-book"><i class="fas fa-book"></i></div>
              <div class="icon-option" data-icon="fa-graduation-cap"><i class="fas fa-graduation-cap"></i></div>
              <div class="icon-option" data-icon="fa-brain"><i class="fas fa-brain"></i></div>
              <div class="icon-option" data-icon="fa-star"><i class="fas fa-star"></i></div>
              <div class="icon-option" data-icon="fa-heart"><i class="fas fa-heart"></i></div>
              <div class="icon-option" data-icon="fa-lightbulb"><i class="fas fa-lightbulb"></i></div>
              <div class="icon-option" data-icon="fa-puzzle-piece"><i class="fas fa-puzzle-piece"></i></div>
              <div class="icon-option" data-icon="fa-games"><i class="fas fa-games"></i></div>
              <div class="icon-option" data-icon="fa-music"><i class="fas fa-music"></i></div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>渐变颜色</label>
          <div class="color-picker-wrapper">
            <input type="color" id="colorStart" value="#4facfe">
            <input type="color" id="colorEnd" value="#00f2fe">
            <span id="gradientPreview" style="flex:1; height:40px; border-radius:8px; border:2px solid var(--border);"></span>
          </div>
          <div class="gradient-presets">
            <div class="gradient-preset active" data-gradient="linear-gradient(135deg, #4facfe, #00f2fe)" style="background: linear-gradient(135deg, #4facfe, #00f2fe);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #f093fb, #f5576c)" style="background: linear-gradient(135deg, #f093fb, #f5576c);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #fa709a, #fee140)" style="background: linear-gradient(135deg, #fa709a, #fee140);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #667eea, #764ba2)" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #10b981, #059669)" style="background: linear-gradient(135deg, #10b981, #059669);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #f59e0b, #d97706)" style="background: linear-gradient(135deg, #f59e0b, #d97706);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #ef4444, #dc2626)" style="background: linear-gradient(135deg, #ef4444, #dc2626);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #8b5cf6, #7c3aed)" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #ec4899, #db2777)" style="background: linear-gradient(135deg, #ec4899, #db2777);"></div>
            <div class="gradient-preset" data-gradient="linear-gradient(135deg, #06b6d4, #0891b2)" style="background: linear-gradient(135deg, #06b6d4, #0891b2);"></div>
          </div>
        </div>

        <div class="form-group">
          <label>分类标签</label>
          <div class="category-checkboxes">
            <label class="category-checkbox"><input type="checkbox" value="design" checked> <i class="fas fa-palette"></i> 设计</label>
            <label class="category-checkbox"><input type="checkbox" value="teaching" checked> <i class="fas fa-chalkboard-teacher"></i> 教学</label>
            <label class="category-checkbox"><input type="checkbox" value="math"> <i class="fas fa-calculator"></i> 数学</label>
            <label class="category-checkbox"><input type="checkbox" value="text"> <i class="fas fa-font"></i> 文字</label>
            <label class="category-checkbox"><input type="checkbox" value="office"> <i class="fas fa-briefcase"></i> 办公</label>
            <label class="category-checkbox"><input type="checkbox" value="game"> <i class="fas fa-games"></i> 游戏</label>
            <label class="category-checkbox"><input type="checkbox" value="utility"> <i class="fas fa-tools"></i> 实用</label>
          </div>
        </div>

        <div class="form-group">
          <label>工具描述 *</label>
          <textarea id="toolDesc" placeholder="简要描述工具的功能和用途..." required></textarea>
        </div>

        <div class="form-group">
          <label>标签（回车添加）</label>
          <div class="tag-input-wrapper" id="tagWrapper">
            <input type="text" id="tagInput" placeholder="输入标签后按回车">
          </div>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex:1;"><i class="fas fa-save"></i> <span id="submitText">添加</span></button>
          <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> 重置</button>
        </div>
      </form>

      <!-- 工具列表 -->
      <div class="tools-list">
        <div class="panel-title"><i class="fas fa-list"></i> 工具列表</div>
        <div id="toolsList"></div>
      </div>
    </div>

    <!-- 右侧：预览和导出区域 -->
    <div>
      <!-- 实时预览 -->
      <div class="panel">
        <div class="panel-title"><i class="fas fa-eye"></i> 卡片预览</div>
        <div id="previewArea">
          <div class="preview-card" id="previewCard">
            <div class="preview-icon" id="previewIcon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
              <i class="fas fa-cloud"></i>
            </div>
            <h3 id="previewName">工具名称</h3>
            <p id="previewDesc">工具描述将显示在这里...</p>
            <div class="preview-tags" id="previewTags">
              <span class="preview-tag">标签</span>
            </div>
            <span class="preview-link">立即使用 <i class="fas fa-arrow-right"></i></span>
          </div>
        </div>
      </div>

      <!-- JSON 输出 -->
      <div class="panel json-output">
        <div class="panel-title"><i class="fas fa-code"></i> 配置代码 (tools.json)</div>
        <textarea id="jsonOutput" readonly></textarea>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
          <button class="btn btn-primary" onclick="copyJSON()"><i class="fas fa-copy"></i> 复制</button>
          <button class="btn btn-success" onclick="downloadJSON()"><i class="fas fa-download"></i> 下载 JSON</button>
          <button class="btn btn-secondary" onclick="loadFromJSON()"><i class="fas fa-upload"></i> 从 JSON 导入</button>
        </div>
      </div>

      <!-- 使用说明 -->
      <div class="panel" style="margin-top: 2rem;">
        <div class="panel-title"><i class="fas fa-info-circle"></i> 使用说明</div>
        <ol style="padding-left: 1.5rem; color: var(--text-light); line-height: 2;">
          <li>填写表单添加新工具</li>
          <li>点击"下载 JSON"获取配置文件</li>
          <li>将下载的 <code>tools.json</code> 上传到 GitHub 仓库根目录</li>
          <li>主页会自动读取配置文件生成卡片</li>
          <li>需要更新时，重复以上步骤覆盖旧文件</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<!-- 成功提示 -->
<div class="success-toast" id="successToast">
  <i class="fas fa-check-circle"></i> <span id="toastMessage">操作成功！</span>
</div>

<script>
  // 工具数据
  let tools = [];
  let currentTags = [];
  let selectedIcon = 'fa-cloud';

  // 预置工具数据（初始示例）
  const defaultTools = [
    {
      name: "云朵字生成器",
      file: "cloud-text.html",
      icon: "fa-cloud",
      gradient: "linear-gradient(135deg, #4facfe, #00f2fe)",
      category: ["design", "teaching"],
      description: "制作可爱的云朵风格文字，支持多种字体、颜色自定义，一键导出A4尺寸PNG/PDF。",
      tags: ["免费", "A4导出", "多字体"]
    },
    {
      name: "小数魔法屋",
      file: "xiaoshu.html",
      icon: "fa-calculator",
      gradient: "linear-gradient(135deg, #f093fb, #f5576c)",
      category: ["teaching", "math"],
      description: "小学数学互动神器！包含小数读写、性质、近似数四舍五入练习。",
      tags: ["免费", "小学数学", "互动"]
    },
    {
      name: "PDF预览排序合并工具",
      file: "pdf-merge.html",
      icon: "fa-file-pdf",
      gradient: "linear-gradient(135deg, #fa709a, #fee140)",
      category: ["office", "teaching"],
      description: "上传多个PDF文件，预览每一页内容，拖拽调整顺序，按需合并。",
      tags: ["免费", "纯本地", "拖拽排序"]
    }
  ];

  // 初始化
  document.addEventListener('DOMContentLoaded', () => {
    loadFromLocalStorage();
    if (tools.length === 0) {
      tools = [...defaultTools];
      saveToLocalStorage();
    }
    renderToolsList();
    updateJSONOutput();
    updatePreview();
    updateGradientPreview();
  });

  // 从 localStorage 加载
  function loadFromLocalStorage() {
    const saved = localStorage.getItem('teacherToolsData');
    if (saved) {
      tools = JSON.parse(saved);
    }
  }

  // 保存到 localStorage
  function saveToLocalStorage() {
    localStorage.setItem('teacherToolsData', JSON.stringify(tools));
  }

  // 图标选择
  document.querySelectorAll('.icon-option').forEach(option => {
    option.addEventListener('click', () => {
      document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('active'));
      option.classList.add('active');
      selectedIcon = option.dataset.icon;
      updatePreview();
    });
  });

  // 渐变预设
  document.querySelectorAll('.gradient-preset').forEach(preset => {
    preset.addEventListener('click', () => {
      document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('active'));
      preset.classList.add('active');
      const gradient = preset.dataset.gradient;
      document.getElementById('colorStart').value = extractColor(gradient, 0);
      document.getElementById('colorEnd').value = extractColor(gradient, 1);
      updateGradientPreview();
      updatePreview();
    });
  });

  function extractColor(gradient, index) {
    const colors = gradient.match(/#[a-fA-F0-9]{6}/g);
    return colors[index];
  }

  // 颜色选择器联动
  document.getElementById('colorStart').addEventListener('input', updateGradientPreview);
  document.getElementById('colorEnd').addEventListener('input', updateGradientPreview);

  function updateGradientPreview() {
    const start = document.getElementById('colorStart').value;
    const end = document.getElementById('colorEnd').value;
    const gradient = `linear-gradient(135deg, ${start}, ${end})`;
    document.getElementById('gradientPreview').style.background = gradient;
    document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('active'));
  }

  // 标签管理
  const tagInput = document.getElementById('tagInput');
  const tagWrapper = document.getElementById('tagWrapper');

  tagInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && tagInput.value.trim()) {
      e.preventDefault();
      addTag(tagInput.value.trim());
      tagInput.value = '';
    }
  });

  function addTag(tag) {
    if (currentTags.includes(tag)) return;
    currentTags.push(tag);
    renderTags();
    updatePreview();
  }

  function removeTag(tag) {
    currentTags = currentTags.filter(t => t !== tag);
    renderTags();
    updatePreview();
  }

  function renderTags() {
    const existingTags = tagWrapper.querySelectorAll('.tag-item');
    existingTags.forEach(t => t.remove());
    
    currentTags.forEach(tag => {
      const tagEl = document.createElement('span');
      tagEl.className = 'tag-item';
      tagEl.innerHTML = `${tag} <span class="remove-tag" onclick="removeTag('${tag}')">×</span>`;
      tagWrapper.insertBefore(tagEl, tagInput);
    });
  }

  // 表单提交
  document.getElementById('toolForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const name = document.getElementById('toolName').value.trim();
    const file = document.getElementById('toolFile').value.trim();
    const desc = document.getElementById('toolDesc').value.trim();
    const startColor = document.getElementById('colorStart').value;
    const endColor = document.getElementById('colorEnd').value;
    const gradient = `linear-gradient(135deg, ${startColor}, ${endColor})`;
    const categories = Array.from(document.querySelectorAll('.category-checkbox input:checked')).map(cb => cb.value);
    
    const editIndex = parseInt(document.getElementById('editIndex').value);
    
    const tool = {
      name,
      file,
      icon: selectedIcon,
      gradient,
      category: categories.length > 0 ? categories : ['teaching'],
      description: desc,
      tags: [...currentTags]
    };
    
    if (editIndex >= 0) {
      tools[editIndex] = tool;
      showToast('工具已更新！');
    } else {
      tools.push(tool);
      showToast('工具已添加！');
    }
    
    saveToLocalStorage();
    renderToolsList();
    updateJSONOutput();
    resetForm();
  });

  // 重置表单
  function resetForm() {
    document.getElementById('toolForm').reset();
    document.getElementById('editIndex').value = -1;
    document.getElementById('submitText').textContent = '添加';
    currentTags = [];
    renderTags();
    
    document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('active'));
    document.querySelector('.icon-option[data-icon="fa-cloud"]').classList.add('active');
    selectedIcon = 'fa-cloud';
    
    document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('active'));
    document.querySelector('.gradient-preset').classList.add('active');
    
    document.querySelectorAll('.category-checkbox input').forEach(cb => {
      cb.checked = ['design', 'teaching'].includes(cb.value);
    });
    
    updateGradientPreview();
    updatePreview();
  }

  // 编辑工具
  function editTool(index) {
    const tool = tools[index];
    
    document.getElementById('toolName').value = tool.name;
    document.getElementById('toolFile').value = tool.file;
    document.getElementById('toolDesc').value = tool.description;
    document.getElementById('editIndex').value = index;
    document.getElementById('submitText').textContent = '更新';
    
    // 设置图标
    document.querySelectorAll('.icon-option').forEach(o => {
      o.classList.toggle('active', o.dataset.icon === tool.icon);
    });
    selectedIcon = tool.icon;
    
    // 设置颜色
    const colors = tool.gradient.match(/#[a-fA-F0-9]{6}/g);
    if (colors && colors.length >= 2) {
      document.getElementById('colorStart').value = colors[0];
      document.getElementById('colorEnd').value = colors[1];
    }
    updateGradientPreview();
    
    // 设置分类
    document.querySelectorAll('.category-checkbox input').forEach(cb => {
      cb.checked = tool.category.includes(cb.value);
    });
    
    // 设置标签
    currentTags = [...(tool.tags || [])];
    renderTags();
    
    updatePreview();
    
    // 滚动到表单
    document.getElementById('toolForm').scrollIntoView({ behavior: 'smooth' });
  }

  // 删除工具
  function deleteTool(index) {
    if (confirm('确定要删除这个工具吗？')) {
      tools.splice(index, 1);
      saveToLocalStorage();
      renderToolsList();
      updateJSONOutput();
      showToast('工具已删除！');
    }
  }

  // 渲染工具列表
  function renderToolsList() {
    const container = document.getElementById('toolsList');
    
    if (tools.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>暂无工具，请添加第一个工具</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = tools.map((tool, index) => `
      <div class="tool-item">
        <div class="tool-item-info">
          <div class="tool-item-icon" style="background: ${tool.gradient};">
            <i class="fas ${tool.icon}"></i>
          </div>
          <div class="tool-item-details">
            <h4>${tool.name}</h4>
            <span>${tool.file}</span>
          </div>
        </div>
        <div class="tool-item-actions">
          <button class="edit-btn" onclick="editTool(${index})" title="编辑"><i class="fas fa-edit"></i></button>
          <button class="delete-btn" onclick="deleteTool(${index})" title="删除"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  // 更新预览
  function updatePreview() {
    const name = document.getElementById('toolName').value || '工具名称';
    const desc = document.getElementById('toolDesc').value || '工具描述将显示在这里...';
    const startColor = document.getElementById('colorStart').value;
    const endColor = document.getElementById('colorEnd').value;
    const gradient = `linear-gradient(135deg, ${startColor}, ${endColor})`;
    
    document.getElementById('previewName').textContent = name;
    document.getElementById('previewDesc').textContent = desc;
    document.getElementById('previewIcon').style.background = gradient;
    document.getElementById('previewIcon').innerHTML = `<i class="fas ${selectedIcon}"></i>`;
    
    const tagsContainer = document.getElementById('previewTags');
    if (currentTags.length > 0) {
      tagsContainer.innerHTML = currentTags.map(tag => `<span class="preview-tag">${tag}</span>`).join('');
    } else {
      tagsContainer.innerHTML = '<span class="preview-tag">标签</span>';
    }
  }

  // 实时预览更新
  document.getElementById('toolName').addEventListener('input', updatePreview);
  document.getElementById('toolDesc').addEventListener('input', updatePreview);

  // 更新 JSON 输出
  function updateJSONOutput() {
    const json = {
      tools: tools
    };
    document.getElementById('jsonOutput').value = JSON.stringify(json, null, 2);
  }

  // 复制 JSON
  function copyJSON() {
    const textarea = document.getElementById('jsonOutput');
    textarea.select();
    document.execCommand('copy');
    showToast('JSON 已复制到剪贴板！');
  }

  // 下载 JSON
  function downloadJSON() {
    const json = document.getElementById('jsonOutput').value;
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tools.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('JSON 文件已下载！');
  }

  // 从 JSON 导入
  function loadFromJSON() {
    const json = document.getElementById('jsonOutput').value;
    try {
      const data = JSON.parse(json);
      if (data.tools && Array.isArray(data.tools)) {
        tools = data.tools;
        saveToLocalStorage();
        renderToolsList();
        updatePreview();
        showToast('配置已导入！');
      } else {
        alert('JSON 格式不正确！');
      }
    } catch (e) {
      alert('JSON 解析失败：' + e.message);
    }
  }

  // 显示提示
  function showToast(message) {
    const toast = document.getElementById('successToast');
    document.getElementById('toastMessage').textContent = message;
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 3000);
  }
</script>

</body>
</html>
